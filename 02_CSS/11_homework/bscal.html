<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5 計算機教學範例</title>
    <!-- 引入 Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f3f5;
            padding: 50px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* 計算機主體樣式 */
        .calc-container {
            max-width: 360px;
            margin: auto;
            background-color: #212529;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        /* 顯示螢幕 */
        .calc-display {
            background-color: transparent;
            color: white;
            font-size: 3rem;
            text-align: right;
            padding: 20px 10px;
            margin-bottom: 10px;
            min-height: 100px;
            word-wrap: break-word;
            word-break: break-all;
            overflow: hidden;
        }
        /* 按鈕基本樣式 */
        .btn-calc {
            height: 70px;
            border-radius: 50%; /* 圓形按鈕感 */
            font-size: 1.5rem;
            font-weight: 500;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        /* 數字按鈕 (Bootstrap Light) */
        .btn-number {
            background-color: #343a40;
            color: white;
        }
        .btn-number:hover {
            background-color: #495057;
            color: white;
        }
        /* 運算子按鈕 */
        .btn-operator {
            background-color: #ff9500;
            color: white;
        }
        .btn-operator:hover {
            background-color: #ffb74d;
            color: white;
        }
        /* 功能按鈕 */
        .btn-function {
            background-color: #adb5bd;
            color: black;
        }
        .btn-function:hover {
            background-color: #ced4da;
        }
        /* 底部原始碼區域 */
        .source-code-section {
            max-width: 800px;
            margin: 50px auto;
        }
        pre {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 0.9rem;
        }
        /* 修正 0 的跨欄樣式 */
        .btn-zero {
            border-radius: 35px;
            justify-content: flex-start;
            padding-left: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-5 fw-bold">Bootstrap 5 計算機範例</h2>

    <!-- 計算機本體 -->
    <div class="calc-container">
        <!-- 顯示螢幕 -->
        <div id="display" class="calc-display">0</div>

        <!-- 按鈕區 (Grid) -->
        <div class="row g-3">
            <!-- 第一排 -->
            <div class="col-3">
                <button class="btn-calc btn-function w-100" onclick="clearDisplay()">AC</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-function w-100" onclick="backspace()">⌫</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-function w-100" onclick="inputOperator('%')">%</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-operator w-100" onclick="inputOperator('/')">÷</button>
            </div>

            <!-- 第二排 -->
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('7')">7</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('8')">8</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('9')">9</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-operator w-100" onclick="inputOperator('*')">×</button>
            </div>

            <!-- 第三排 -->
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('4')">4</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('5')">5</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('6')">6</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-operator w-100" onclick="inputOperator('-')">-</button>
            </div>

            <!-- 第四排 -->
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('1')">1</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('2')">2</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('3')">3</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-operator w-100" onclick="inputOperator('+')">+</button>
            </div>

            <!-- 第五排 -->
            <div class="col-6">
                <button class="btn-calc btn-number btn-zero w-100" onclick="inputNum('0')">0</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-number w-100" onclick="inputNum('.')">.</button>
            </div>
            <div class="col-3">
                <button class="btn-calc btn-operator w-100" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <!-- 原始碼展示區 -->
    <div class="source-code-section">
        <hr>
        <h4 class="mt-4 mb-3">範例原始碼 (HTML / CSS / JS)</h4>
        <p class="text-muted small">學生可參考下方的結構來學習 Bootstrap Grid 與 JavaScript 邏輯：</p>
        <pre id="code-display"></pre>
    </div>
</div>

<!-- JavaScript 功能邏輯 -->
<script>
    let display = document.getElementById('display');
    let currentInput = '0';

    // 更新畫面
    function updateDisplay() {
        display.innerText = currentInput;
    }

    // 輸入數字
    function inputNum(num) {
        if (currentInput === '0' && num !== '.') {
            currentInput = num;
        } else {
            // 防止重複點點
            if (num === '.' && currentInput.includes('.')) return;
            currentInput += num;
        }
        updateDisplay();
    }

    // 輸入運算子
    function inputOperator(op) {
        let lastChar = currentInput.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) {
            currentInput = currentInput.slice(0, -1) + op;
        } else {
            currentInput += op;
        }
        updateDisplay();
    }

    // 清除
    function clearDisplay() {
        currentInput = '0';
        updateDisplay();
    }

    // 退格
    function backspace() {
        if (currentInput.length > 1) {
            currentInput = currentInput.slice(0, -1);
        } else {
            currentInput = '0';
        }
        updateDisplay();
    }

    // 計算結果
    function calculate() {
        try {
            // 使用 eval 進行簡單計算 (教學用途)
            // 將顯示的符號換回 eval 能辨識的
            let result = eval(currentInput);
            currentInput = result.toString();
            updateDisplay();
        } catch (e) {
            currentInput = 'Error';
            updateDisplay();
            setTimeout(clearDisplay, 1500);
        }
    }

    // 將此檔案內容轉義並顯示在 pre 標籤中
    window.onload = function() {
        let rawHtml = document.documentElement.outerHTML;
        // 簡單轉義 HTML 標籤
        let escapedHtml = rawHtml
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        document.getElementById('code-display').innerHTML = escapedHtml;
    };
</script>

</body>
</html>
