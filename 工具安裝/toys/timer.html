<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡倒數計時器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .timer-unit {
            min-width: 80px;
        }

        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-lg">
        <!-- 輸入設定介面 -->
        <div id="setup-screen" class="glass-card rounded-3xl p-8 space-y-6 fade-in">
            <div class="text-center">
                <h1 class="text-3xl font-bold mb-2">倒數計時器</h1>
                <p class="text-slate-400">請設定你的目標時間</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">結束日期與時間</label>
                    <input type="datetime-local" id="target-time" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                </div>
                
                <button onclick="startCountdown()" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 rounded-xl transition-all shadow-lg active:scale-95">
                    開始倒數
                </button>
            </div>
            
            <div id="error-msg" class="hidden text-red-400 text-sm text-center">請選擇未來的時間</div>
        </div>

        <!-- 倒數顯示介面 -->
        <div id="countdown-screen" class="hidden glass-card rounded-3xl p-8 space-y-8 text-center fade-in">
            <h2 class="text-xl font-medium text-slate-400">距離目標時間還剩</h2>
            
            <div class="flex justify-center gap-4">
                <div class="timer-unit">
                    <div id="days" class="text-4xl font-extrabold text-blue-400">00</div>
                    <div class="text-xs text-slate-500 uppercase mt-1">天</div>
                </div>
                <div class="text-4xl font-light text-slate-600">:</div>
                <div class="timer-unit">
                    <div id="hours" class="text-4xl font-extrabold text-white">00</div>
                    <div class="text-xs text-slate-500 uppercase mt-1">時</div>
                </div>
                <div class="text-4xl font-light text-slate-600">:</div>
                <div class="timer-unit">
                    <div id="minutes" class="text-4xl font-extrabold text-white">00</div>
                    <div class="text-xs text-slate-500 uppercase mt-1">分</div>
                </div>
                <div class="text-4xl font-light text-slate-600">:</div>
                <div class="timer-unit">
                    <div id="seconds" class="text-4xl font-extrabold text-blue-400">00</div>
                    <div class="text-xs text-slate-500 uppercase mt-1">秒</div>
                </div>
            </div>

            <div class="pt-4">
                <button onclick="resetTimer()" class="text-slate-500 hover:text-white transition-colors text-sm underline underline-offset-4">
                    重新設定
                </button>
            </div>
        </div>

        <!-- 結束畫面 -->
        <div id="end-screen" class="hidden glass-card rounded-3xl p-12 text-center space-y-6 fade-in">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-4xl font-extrabold text-white">時間到！</h2>
            <p class="text-slate-400">倒數計時已結束。</p>
            <button onclick="resetTimer()" 
                class="bg-white text-slate-900 font-bold px-8 py-3 rounded-full hover:bg-slate-200 transition-all">
                返回
            </button>
        </div>
    </div>

    <script>
        let countdownInterval;

        // 初始化：將預設時間設為 1 小時後
        window.onload = () => {
            const now = new Date();
            now.setHours(now.getHours() + 1);
            const defaultTime = now.toISOString().slice(0, 16);
            document.getElementById('target-time').value = defaultTime;
        };

        function startCountdown() {
            const targetInput = document.getElementById('target-time').value;
            if (!targetInput) return;

            const targetDate = new Date(targetInput).getTime();
            const now = new Date().getTime();

            if (targetDate <= now) {
                const errorMsg = document.getElementById('error-msg');
                errorMsg.classList.remove('hidden');
                return;
            }

            // 切換畫面
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('countdown-screen').classList.remove('hidden');

            updateTimer(targetDate);
            countdownInterval = setInterval(() => updateTimer(targetDate), 1000);
        }

        function updateTimer(targetDate) {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(countdownInterval);
                showEndScreen();
                return;
            }

            // 計算時間
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            // 更新 DOM
            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }

        function showEndScreen() {
            document.getElementById('countdown-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
        }

        function resetTimer() {
            clearInterval(countdownInterval);
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('countdown-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
        }
    </script>
</body>
</html>
