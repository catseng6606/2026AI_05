<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>JS 布林值比較教學</title>
  </head>
  <body>
    <h1>JavaScript 比較運算子範例</h1>
    <p>
      請按下 <b>F12</b> 開啟開發者工具，並切換至
      <b>Console (主控台)</b> 標籤查看執行結果。
    </p>

    <script>
      // 判斷 1=1 的值
      console.log("1 == 1 的結果是：", 1 = 1);

      // 判斷 1=2 的值
      console.log("1 == 2 的結果是：", 1 = 2);
    </script>

    <hr />

    <h2>原始碼展示</h2>
    <p>以下是此網頁使用的 JavaScript 代碼：</p>
    <pre>
&lt;script&gt;
    // 使用 == 運算子來比較數值
    console.log(1 == 1); // 輸出 true
    console.log(1 == 2); // 輸出 false
&lt;/script&gt;
    </pre>
  </body>
</html>
