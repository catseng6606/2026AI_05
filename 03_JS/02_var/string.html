<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>JS 字串宣告方式</title>
  </head>
  <body>
    <h1>JavaScript 字串宣告教學</h1>
    <p>請開啟瀏覽器開發者工具 (F12) 查看 Console 輸出結果。</p>

    <!-- 範例程式碼展示區 -->
    <hr />
    <h3>原始碼參考：</h3>
    <pre>
&lt;script&gt;
    // 方式一：使用雙引號 ""
    let str1 = "這是使用雙引號宣告的字串";
    console.log(str1);

    // 方式二：使用單引號 ''
    let str2 = '這是使用單引號宣告的字串';
    console.log(str2);
&lt;/script&gt;
    </pre>

    <script>
      // 方式一：使用雙引號 ""
      let str1 = "這是使用雙引號宣告的字串";
      console.log(str1);

      // 方式二：使用單引號 ''
      let str2 = "這是使用單引號宣告的字串";
      console.log(str2);
    </script>
  </body>
</html>
