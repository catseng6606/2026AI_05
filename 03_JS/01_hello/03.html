<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Console Log Hello World</title>
</head>
<body>

    <h1>JavaScript Hello World (Console)</h1>
    <p>請按下 <b>F12</b> 或 <b>右鍵 > 檢查</b>，然後切換到 <b>Console (主控台)</b> 標籤來查看輸出結果。</p>

    <hr>

    <h3>教學原始碼對照：</h3>
    <pre>
&lt;script&gt;
    console.log("Hello World");
&lt;/script&gt;
    </pre>

    <script>
        // 在瀏覽器控制台輸出訊息
        console.log("Hello World");
    </script>

</body>
</html>
