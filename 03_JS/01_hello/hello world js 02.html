<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Alert Hello World</title>
  </head>
  <body>
    <h1>JavaScript Hello World - Alert 範例</h1>
    <p>當頁面載入時，會跳出一個警告視窗顯示 "Hello World!"。</p>

    <!-- JavaScript 程式碼 -->
    <script>
      alert("Hello World!");
    </script>

    <hr />
    <h2>教學原始碼展示</h2>
    <p>以下是此頁面的 JavaScript 部分原始碼：</p>
    <pre>
&lt;script&gt;
    alert('Hello World!');
&lt;/script&gt;
    </pre>
  </body>
</html>
