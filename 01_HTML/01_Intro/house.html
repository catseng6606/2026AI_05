<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>AI 幫我裝潢，管家幫我開門</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #dff3ff;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    .scene {
      text-align: center;
    }

    .house {
      width: 360px;
      background: #fff7df;
      border: 6px solid #8b5e3c;
      border-radius: 0 0 20px 20px;
      padding: 30px;
      position: relative;
      box-shadow: 0 12px 30px rgba(0,0,0,.2);
    }

    .roof {
      width: 0;
      height: 0;
      border-left: 190px solid transparent;
      border-right: 190px solid transparent;
      border-bottom: 120px solid #c0392b;
      margin: 0 auto -5px;
    }

    .door {
      cursor: pointer;
      transition: transform .3s;
    }

    .door:hover {
      transform: scale(1.05);
    }

    .butler {
      margin-top: 20px;
      cursor: pointer;
      transition: transform .2s;
    }

    .butler:hover {
      transform: translateY(-5px);
    }

    .message {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
      color: #5a3d2b;
    }
  </style>
</head>

<body>
  <div class="scene">
    <div class="roof"></div>

    <div class="house">
      <h1>我的小房子</h1>
      <p>請點選管家，讓他幫你開門。</p>

      <!-- 門 SVG -->
      <div id="doorArea">
        <svg class="door" width="120" height="160" viewBox="0 0 120 160">
          <rect x="20" y="10" width="80" height="140" rx="8" fill="#8b4513" />
          <circle cx="85" cy="85" r="6" fill="#ffd700" />
          <text x="60" y="150" text-anchor="middle" fill="white" font-size="16">
            關門
          </text>
        </svg>
      </div>
    </div>

    <!-- 管家 SVG -->
    <svg id="butler" class="butler" width="120" height="160" viewBox="0 0 120 160">
      <!-- 頭 -->
      <circle cx="60" cy="30" r="20" fill="#f1c27d" />

      <!-- 頭髮 -->
      <path d="M40 25 Q60 5 80 25" fill="#333" />

      <!-- 身體 -->
      <rect x="35" y="55" width="50" height="70" rx="10" fill="#222" />

      <!-- 襯衫 -->
      <polygon points="45,55 60,90 75,55" fill="white" />

      <!-- 領結 -->
      <polygon points="55,70 60,75 55,80" fill="#c0392b" />
      <polygon points="65,70 60,75 65,80" fill="#c0392b" />

      <!-- 手 -->
      <line x1="35" y1="70" x2="15" y2="100" stroke="#f1c27d" stroke-width="8" />
      <line x1="85" y1="70" x2="105" y2="100" stroke="#f1c27d" stroke-width="8" />

      <!-- 腳 -->
      <line x1="50" y1="125" x2="45" y2="155" stroke="#222" stroke-width="10" />
      <line x1="70" y1="125" x2="75" y2="155" stroke="#222" stroke-width="10" />

      <text x="60" y="150" text-anchor="middle" fill="#333" font-size="14">
        管家
      </text>
    </svg>

    <div id="message" class="message">管家正在等待指令...</div>
  </div>

  <script>
    const butler = document.getElementById("butler");
    const doorArea = document.getElementById("doorArea");
    const message = document.getElementById("message");

    let isOpen = false;

    butler.addEventListener("click", function () {
      isOpen = !isOpen;

      if (isOpen) {
        doorArea.innerHTML = `
          <svg class="door" width="120" height="160" viewBox="0 0 120 160">
            <rect x="20" y="10" width="80" height="140" rx="8" fill="#8b4513" opacity="0.25" />
            <polygon points="20,10 85,30 85,150 20,150" fill="#a0522d" />
            <circle cx="75" cy="90" r="6" fill="#ffd700" />
            <text x="60" y="150" text-anchor="middle" fill="white" font-size="16">
              開門
            </text>
          </svg>
        `;
        message.textContent = "門打開了，歡迎進來！";
      } else {
        doorArea.innerHTML = `
          <svg class="door" width="120" height="160" viewBox="0 0 120 160">
            <rect x="20" y="10" width="80" height="140" rx="8" fill="#8b4513" />
            <circle cx="85" cy="85" r="6" fill="#ffd700" />
            <text x="60" y="150" text-anchor="middle" fill="white" font-size="16">
              關門
            </text>
          </svg>
        `;
        message.textContent = "管家把門關起來了。";
      }
    });
  </script>
</body>
</html>
