<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時光新聞 | 全球即時資訊網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }

        .news-card:hover img {
            transform: scale(1.05);
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .transition-all {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- 導航欄 -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="#" onclick="showHome()" class="flex items-center space-x-2 text-red-600 font-bold text-2xl">
                        <i data-lucide="newspaper"></i>
                        <span>時光新聞</span>
                    </a>
                    <div class="hidden md:flex space-x-6 text-sm font-medium text-slate-600">
                        <button onclick="filterCategory('all')" class="hover:text-red-600 transition-colors">所有新聞</button>
                        <button onclick="filterCategory('科技')" class="hover:text-red-600 transition-colors">科技</button>
                        <button onclick="filterCategory('經濟')" class="hover:text-red-600 transition-colors">經濟</button>
                        <button onclick="filterCategory('生活')" class="hover:text-red-600 transition-colors">生活</button>
                        <button onclick="filterCategory('娛樂')" class="hover:text-red-600 transition-colors">娛樂</button>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <div class="relative hidden sm:block">
                        <input type="text" id="searchInput" placeholder="搜尋新聞..." 
                            class="pl-10 pr-4 py-2 border rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-red-500 w-64 bg-slate-50">
                        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                    </div>
                    <button class="p-2 text-slate-500 hover:text-red-600 md:hidden">
                        <i data-lucide="menu"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main id="main-content" class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- 今日頭條 (Hero Section) -->
        <section id="hero-section" class="mb-12">
            <div id="featured-article" class="relative rounded-2xl overflow-hidden cursor-pointer group shadow-lg">
                <!-- 由 JS 動態注入 -->
            </div>
        </section>

        <!-- 新聞列表標題與過濾 -->
        <div class="flex items-center justify-between mb-8 border-l-4 border-red-600 pl-4">
            <h2 id="category-title" class="text-2xl font-bold">最新消息</h2>
            <span id="article-count" class="text-slate-400 text-sm"></span>
        </div>

        <!-- 新聞網格 -->
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 由 JS 動態注入 -->
        </div>

    </main>

    <!-- 文章閱讀模式 (隱藏中) -->
    <article id="article-detail" class="hidden max-w-4xl mx-auto px-4 py-8 bg-white shadow-sm mt-8 rounded-xl">
        <button onclick="showHome()" class="mb-6 flex items-center text-slate-500 hover:text-red-600 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> 返回首頁
        </button>
        <div id="article-content">
            <!-- 由 JS 動態注入 -->
        </div>
    </article>

    <!-- 頁腳 -->
    <footer class="bg-slate-900 text-slate-400 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                <div class="col-span-1 md:col-span-2">
                    <div class="flex items-center space-x-2 text-white font-bold text-2xl mb-4">
                        <i data-lucide="newspaper"></i>
                        <span>時光新聞</span>
                    </div>
                    <p class="text-sm max-w-sm leading-relaxed">
                        提供全球最即時、客觀、深度的新聞報導。我們致力於揭露真相，串聯世界每一個角落的聲音。
                    </p>
                </div>
                <div>
                    <h3 class="text-white font-semibold mb-4">快速連結</h3>
                    <ul class="space-y-2 text-sm">
                        <li><a href="#" class="hover:text-white">關於我們</a></li>
                        <li><a href="#" class="hover:text-white">隱私權政策</a></li>
                        <li><a href="#" class="hover:text-white">服務條款</a></li>
                        <li><a href="#" class="hover:text-white">聯絡我們</a></li>
                    </ul>
                </div>
                <div>
                    <h3 class="text-white font-semibold mb-4">關注我們</h3>
                    <div class="flex space-x-4">
                        <a href="#" class="hover:text-white"><i data-lucide="facebook"></i></a>
                        <a href="#" class="hover:text-white"><i data-lucide="twitter"></i></a>
                        <a href="#" class="hover:text-white"><i data-lucide="instagram"></i></a>
                    </div>
                </div>
            </div>
            <div class="border-t border-slate-800 mt-12 pt-8 text-center text-xs">
                &copy; 2024 時光新聞媒體集團。版權所有。
            </div>
        </div>
    </footer>

    <script>
        // 模擬新聞數據
        const newsData = [
            {
                id: 1,
                category: "科技",
                title: "2024 全球 AI 峰會：通用人工智能是否已近在咫尺？",
                excerpt: "專家在今日舉行的全球 AI 峰會上討論了大語言模型的未來，以及我們該如何應對 AI 帶來的倫理挑戰。",
                content: "隨著技術的不斷突破，人工智能正以超乎想像的速度進化。在今日的峰會中，多位頂尖科學家指出，AI 不再僅僅是工具，它正在重塑人類的生產力邏輯。然而，隨之而來的版權、偏見與失業風險，仍是各國政府亟需解決的難題。本次峰會吸引了超過 500 家科技企業參與...",
                image: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=800",
                date: "2024-05-10",
                author: "張志明",
                featured: true
            },
            {
                id: 2,
                category: "經濟",
                title: "央行宣佈維持利率不變，市場展望趨向穩定",
                excerpt: "在最新的貨幣政策會議後，央行決定不調整現行利率，這項決策符合多數經濟學家的預期。",
                content: "金融市場對此反應積極，股指在消息發布後小幅上揚。分析師認為，穩定的利率環境有助於企業進行長期投資規劃。儘管通膨壓力仍存，但勞動力市場的強勁表現為政策提供了足夠的緩衝空間...",
                image: "https://images.unsplash.com/photo-1611974714024-462cd497bc71?auto=format&fit=crop&q=80&w=800",
                date: "2024-05-09",
                author: "李曉華",
                featured: false
            },
            {
                id: 3,
                category: "生活",
                title: "夏季旅遊潮來襲：盤點今年最受歡迎的避暑聖地",
                excerpt: "隨著氣溫攀升，許多民眾開始計劃暑假出遊。專家推薦了五個隱藏版的清涼景點。",
                content: "從高山森林到隱秘海灘，今年的旅遊熱點呈現出「慢節奏」趨勢。與其去擁擠的知名景點，更多旅客選擇入住山間民宿，享受自然風光。航空業者也表示，預訂量已恢復至疫情前水平的 95%...",
                image: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=800",
                date: "2024-05-08",
                author: "王小美",
                featured: false
            },
            {
                id: 4,
                category: "娛樂",
                title: "年度科幻巨作《星際邊緣》首映禮，影評人盛讚視覺效果",
                excerpt: "這部籌備五年的電影終於上映，首波評價幾乎是一面倒的好評，被譽為新時代的《2001太空漫遊》。",
                content: "導演表示，這部電影使用了全新的動態捕捉技術，力求給觀眾最真實的宇宙體驗。首映禮現場星光熠熠，數位主演均出席與影迷互動。目前預售票已經突破三億美元大關...",
                image: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=800",
                date: "2024-05-07",
                author: "陳大衛",
                featured: false
            },
            {
                id: 5,
                category: "科技",
                title: "下一代電池技術突破，電動車續航力有望翻倍",
                excerpt: "科學家開發出一種新型固態電池原型，其能量密度比目前的鋰電池高出 60%。",
                content: "這項突破可能徹底改變交通工具的生態。新電池不僅更安全（不易起火），充電速度也極快，只需 10 分鐘即可充滿。預計首批商用產品將在 2026 年投入市場...",
                image: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?auto=format&fit=crop&q=80&w=800",
                date: "2024-05-06",
                author: "林博士",
                featured: false
            },
            {
                id: 6,
                category: "經濟",
                title: "綠色能源產業鏈崛起，為年輕人創造數萬職缺",
                excerpt: "隨著各國加速脫碳，太陽能與風能相關產業正迎來前所未有的擴張期。",
                content: "根據最新報告顯示，綠能產業的就業增長率是傳統能源業的三倍。大學院校也紛紛開設永續管理課程，以應對日益增長的人才需求。這不僅是能源的轉型，更是勞動力結構的再造...",
                image: "https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&q=80&w=800",
                date: "2024-05-05",
                author: "趙元凱",
                featured: false
            }
        ];

        let currentCategory = 'all';

        // 初始化頁面
        function init() {
            lucide.createIcons();
            renderFeatured();
            renderNews(newsData);
            
            // 搜尋監聽
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = newsData.filter(item => 
                    item.title.toLowerCase().includes(term) || 
                    item.excerpt.toLowerCase().includes(term)
                );
                renderNews(filtered);
            });
        }

        // 渲染頭條新聞
        function renderFeatured() {
            const featured = newsData.find(n => n.featured);
            const heroEl = document.getElementById('featured-article');
            heroEl.innerHTML = `
                <img src="${featured.image}" class="w-full h-[400px] object-cover transition-transform duration-500" alt="${featured.title}">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent flex flex-col justify-end p-8 text-white">
                    <span class="bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full w-fit mb-4 uppercase">精選頭條</span>
                    <h1 class="text-3xl md:text-4xl font-bold mb-4 leading-tight">${featured.title}</h1>
                    <p class="text-slate-200 text-sm md:text-base max-w-2xl line-clamp-2">${featured.excerpt}</p>
                </div>
            `;
            heroEl.onclick = () => showArticle(featured.id);
        }

        // 渲染新聞列表
        function renderNews(articles) {
            const grid = document.getElementById('news-grid');
            const countEl = document.getElementById('article-count');
            grid.innerHTML = '';
            
            countEl.textContent = `共有 ${articles.length} 則新聞`;

            articles.forEach(article => {
                const card = document.createElement('div');
                card.className = "news-card bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100 cursor-pointer group transition-all hover:shadow-md";
                card.onclick = () => showArticle(article.id);
                
                card.innerHTML = `
                    <div class="relative overflow-hidden h-48">
                        <img src="${article.image}" class="w-full h-full object-cover transition-all" alt="${article.title}">
                        <span class="absolute top-4 left-4 bg-white/90 backdrop-blur px-2 py-1 rounded text-[10px] font-bold text-slate-700 uppercase tracking-wider">${article.category}</span>
                    </div>
                    <div class="p-5">
                        <div class="flex items-center text-xs text-slate-400 mb-3 space-x-2">
                            <span>${article.author}</span>
                            <span>•</span>
                            <span>${article.date}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3 group-hover:text-red-600 transition-colors line-clamp-2">${article.title}</h3>
                        <p class="text-slate-500 text-sm leading-relaxed line-clamp-2">${article.excerpt}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 分類過濾
        function filterCategory(category) {
            currentCategory = category;
            const titleEl = document.getElementById('category-title');
            titleEl.textContent = category === 'all' ? '最新消息' : `${category}新聞`;
            
            const filtered = category === 'all' ? newsData : newsData.filter(n => n.category === category);
            renderNews(filtered);
            
            // 滾動回列表頂部
            document.getElementById('category-title').scrollIntoView({ behavior: 'smooth' });
        }

        // 顯示文章細節
        function showArticle(id) {
            const article = newsData.find(n => n.id === id);
            const contentEl = document.getElementById('article-content');
            
            contentEl.innerHTML = `
                <div class="mb-8">
                    <span class="text-red-600 font-bold uppercase text-sm tracking-widest">${article.category}</span>
                    <h1 class="text-3xl md:text-5xl font-bold mt-4 mb-6 leading-tight">${article.title}</h1>
                    <div class="flex items-center space-x-4 border-y py-4 border-slate-100">
                        <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-500">
                            ${article.author[0]}
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-800">${article.author}</p>
                            <p class="text-xs text-slate-400">發佈於 ${article.date}</p>
                        </div>
                    </div>
                </div>
                <img src="${article.image}" class="w-full rounded-2xl mb-10 shadow-lg" alt="${article.title}">
                <div class="prose max-w-none text-slate-700 text-lg leading-loose space-y-6">
                    <p class="font-bold text-xl text-slate-900 border-l-4 border-red-600 pl-4 mb-6">${article.excerpt}</p>
                    <p>${article.content}</p>
                    <p>這項消息目前正由本報持續追蹤報導。更多細節將在接下來的幾小時內公布。請鎖定時光新聞，掌握第一手資訊。</p>
                </div>
            `;

            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('article-detail').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        // 回到首頁
        function showHome() {
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('article-detail').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = init;
    </script>
</body>
</html>
